<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebAR Markerless</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script>
const API_URL = "https://script.google.com/macros/s/AKfycbwX2aDyCLeMBnyfSe7c9AHHmvx87OeMVNXhdO-XGRBg8KAFLQlIdJo1NqhYOBo7EmHn/exec";
function getDeviceInfo() {
  const ua = navigator.userAgent;

  let deviceType = "Unknown";
  let os = "Unknown";

  if (/Mobi|Android/i.test(ua)) {
    deviceType = "Mobile";
  } else if (/Tablet|iPad/i.test(ua)) {
    deviceType = "Tablet";
  } else {
    deviceType = "Desktop";
  }

  if (/Android/i.test(ua)) {
    os = "Android";
  } else if (/iPhone|iPad|iPod/i.test(ua)) {
    os = "iOS";
  } else if (/Windows/i.test(ua)) {
    os = "Windows";
  } else if (/Mac/i.test(ua)) {
    os = "MacOS";
  } else if (/Linux/i.test(ua)) {
    os = "Linux";
  }

  return {
    deviceType,
    os,
    userAgent: ua
  };
}
function trackEvent(eventName, desa, object, duration = 0) {
  const device = getDeviceInfo();

  const data = {
    timestamp: new Date().toISOString(),
    event: eventName,
    desa: desa,
    object: object,
    device: device.deviceType,
    os: device.os,
    duration: duration
  };

  return fetch(API_URL, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(data)
});
}
</script>
  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
    }
    button {
      padding: 10px 15px; border: none;
      border-radius: 6px; background: #4caf50;
      color: white; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>
  <a-scene>
    <a-assets>
      <!-- Models -->
      <a-asset-item id="rumah-sebujit" src="assets/rumah_sebujit.glb"></a-asset-item>
      <a-asset-item id="nyobeng-sebujit" src="assets/nyobeng_sebujit.glb"></a-asset-item>
      <a-asset-item id="rumah-jagoi" src="assets/rumah_jagoi.glb"></a-asset-item>
      <a-asset-item id="gawia-jagoi" src="assets/gawia_jagoi.glb"></a-asset-item>

      <!-- Audio -->
      <audio id="narasi-sebujit-rumah" src="assets/narasi_rumah_sebujit.mp3"></audio>
      <audio id="narasi-sebujit-ritual" src="assets/narasi_nyobeng.mp3"></audio>
      <audio id="narasi-jagoi-rumah" src="assets/narasi_rumah_jagoi.mp3"></audio>
      <audio id="narasi-jagoi-ritual" src="assets/narasi_gawia.mp3"></audio>
      <audio id="musik-dayak" src="assets/dayak.mp3"></audio>
    </a-assets>

    <!-- Container untuk model -->
    <a-entity id="model-container" position="0 0 -3"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
    </a-entity>

    <a-camera position="0 1.6 0"></a-camera>
  </a-scene>

  <div id="ui">
    <button onclick="keluarHalaman()">⬅ Kembali</button>
  </div>

  <script>
	let sudahKeluar = false;
    const params = new URLSearchParams(window.location.search);
    const desa = params.get("desa");
    const type = params.get("type");
	
	function getObjectName(desa, type) {
  if (desa === "sebujit" && type === "rumah") return "rumah_sebujit";
  if (desa === "sebujit" && type === "ritual") return "ritual_nyobeng";
  if (desa === "jagoi" && type === "rumah") return "rumah_jagoi";
  if (desa === "jagoi" && type === "ritual") return "ritual_gawia_sowa";
  return type;
}
	
	if (desa && type) {
  trackEvent("masuk_markerless", desa, getObjectName(desa, type));
}
	
    const container = document.getElementById("model-container");
    const musikDayak = document.getElementById("musik-dayak");
	
	let startTime = new Date().getTime();
	
    const config = {
      sebujit: {
        rumah: { model: "#rumah-sebujit", audio: "narasi-sebujit-rumah", scale: "0.4 0.4 0.4" },
        ritual: { model: "#nyobeng-sebujit", audio: "narasi-sebujit-ritual", scale: "3 3 3" }
      },
      jagoi: {
        rumah: { model: "#rumah-jagoi", audio: "narasi-jagoi-rumah", scale: "0.4 0.4 0.4" },
        ritual: { model: "#gawia-jagoi", audio: "narasi-jagoi-ritual", scale: "1.2 1.2 1.2" }
      }
    };

    const cfg = config[desa]?.[type];
	if (cfg) {

  	const device = getDeviceInfo(); 

    navigator.sendBeacon(API_URL, JSON.stringify({
    timestamp: new Date().toISOString(),
    event: "model_muncul",
    desa: desa,
    object: getObjectName(desa, type),
    device: device.deviceType, 
    os: device.os,             
    duration: 0
  }));

  container.setAttribute("gltf-model", cfg.model);
  container.setAttribute("scale", cfg.scale);

  const narasi = document.getElementById(cfg.audio);
  musikDayak.play();
  narasi.play();
}
	function keluarHalaman() {
    let endTime = new Date().getTime();
    let duration = Math.floor((endTime - startTime) / 1000);

    trackEvent("keluar_markerless", desa, getObjectName(desa, type), duration)
  .finally(() => {
    window.location.href = "index.html";
  });
  }
  window.addEventListener("beforeunload", () => {
  if (sudahKeluar) return;
  sudahKeluar = true;

  let endTime = new Date().getTime();
  let duration = Math.floor((endTime - startTime) / 1000);

  navigator.sendBeacon(API_URL, JSON.stringify({
  timestamp: new Date().toISOString(),
  event: "keluar_markerless",
  desa: desa,
  object: getObjectName(desa, type),
  device: getDeviceInfo().deviceType,
  os: getDeviceInfo().os,
  duration: duration
}));
  });
  </script>
</body>
</html>
